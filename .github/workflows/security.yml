name: Security

on:
  push:
  pull_request:
  schedule:
    # Weekly, so newly-disclosed CVEs against pinned versions still get caught even when
    # nothing in the repo has changed.
    - cron: "17 6 * * 1"

jobs:
  pip-audit:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Audit dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt

  sbom:
    # anchore/sbom-action shells out to syft via WSL on Windows runners, which
    # windows-latest does not have installed - runs natively on Linux, and this job only
    # introspects the dependency manifest, so it doesn't need Windows at all.
    runs-on: ubuntu-latest
    # The repo's default workflow token permissions are read-only, which blocks the
    # artifact-container creation the action needs to upload the SBOM - grant it here
    # rather than loosening the repo-wide default.
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: graphlink-sbom
