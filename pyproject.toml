[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "graphlink"
dynamic = ["version"]
description = "A local-first, graph-based AI workspace for branching reasoning, tool use, and multi-provider workflows."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "anthropic",
    "beautifulsoup4",
    "ddgs",
    "Markdown",
    "matplotlib",
    "mutagen",
    "ollama",
    "openai>=1.0.0",
    "packaging",
    "Pillow",
    "pygments",
    "pypdf",
    "PySide6",
    "pyspellchecker",
    "python-docx",
    "qtawesome",
    "reportlab",
    "requests",
    "tiktoken",
]

# llama-cpp-python is lazily imported (api_provider._load_llama_cpp_class) only when
# Llama.cpp local mode is actually used - Ollama is the built-in local path, so it is an
# opt-in extra rather than a hard dependency: it is a heavy native build with no wheels
# for newer Python versions, so requiring it would break installs for most users.
[project.optional-dependencies]
llamacpp = ["llama-cpp-python"]
dev = ["pytest", "pytest-env"]

# The suite constructs real QGraphicsObject/QWidget-based nodes and must run
# without a display server (CI runners, this pytest-env setting). QApplication
# picks its platform plugin at construction time from this env var, so it must
# be set before conftest.py's QApplication([]) - pytest-env applies env changes
# before test collection/session start, which is early enough.
[tool.pytest.ini_options]
env = ["QT_QPA_PLATFORM=offscreen"]

[project.gui-scripts]
graphlink = "graphlink_app:main"

[project.urls]
Homepage = "https://github.com/dovvnloading/Graphlink"

# graphlink_app/ has no __init__.py by design (see CONTRIBUTING.md: it is the sys.path
# root, not a package) - modules inside it import each other as flat top-level names
# (e.g. `from graphlink_window import ChatWindow`). package-dir maps graphlink_app/'s
# CONTENTS to the top of the installed distribution so that import style keeps working
# unchanged under an editable/real install; py-modules lists every loose top-level file
# explicitly since setuptools' auto-discovery only picks up real packages (__init__.py
# subdirectories), not loose modules.
[tool.setuptools]
package-dir = { "" = "graphlink_app" }
py-modules = [
    "api_provider",
    "graphlink_agents",
    "graphlink_agents_code_sandbox",
    "graphlink_agents_core",
    "graphlink_agents_pycoder",
