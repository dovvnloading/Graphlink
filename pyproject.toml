[tool.setuptools.packages.find]
where = ["graphlink_app"]
include = [
    "graphlink_canvas*",
    "graphlink_nodes*",
    "graphlink_plugins*",
    "graphlink_session*",
    "graphlink_ui_dialogs*",
    "graphlink_widgets*",
]

[tool.setuptools.dynamic]
version = { attr = "graphlink_version.APP_VERSION" }
